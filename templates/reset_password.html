{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto; padding: 2rem;">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 1.5rem;">ตั้งรหัสผ่านใหม่</h2>
        
        <div id="loading-msg" style="text-align: center; color: #666; margin-bottom: 2rem;">
            กำลังตรวจสอบข้อมูล...
        </div>
        
        <div id="error-msg" style="display: none; text-align: center; color: red; margin-bottom: 2rem; background: #fee2e2; padding: 1rem; border-radius: 5px;">
            ลิงก์รีเซ็ตรหัสผ่านไม่ถูกต้อง หรือหมดอายุแล้ว<br>
            <a href="/forgot-password" style="color: var(--primary); display: inline-block; margin-top: 10px;">ขอลิงก์ใหม่</a>
        </div>

        <form id="reset-form" action="/reset-password" method="POST" style="display: none;">
            <input type="hidden" name="access_token" id="access_token">
            <input type="hidden" name="refresh_token" id="refresh_token">
            
            <div style="margin-bottom: 1.5rem;">
                <label>รหัสผ่านใหม่:</label><br>
                <input type="password" name="new_password" id="new_password" required minlength="6" placeholder="รหัสผ่านอย่างน้อย 6 ตัวอักษร" style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-top: 0.5rem;">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label>ยืนยันรหัสผ่านใหม่:</label><br>
                <input type="password" id="confirm_password" required minlength="6" placeholder="พิมพ์รหัสผ่านอีกครั้ง" style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-top: 0.5rem;">
                <small id="password-match-error" style="color: red; display: none; margin-top: 5px;">รหัสผ่านไม่ตรงกัน</small>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">บันทึกรหัสผ่านใหม่</button>
        </form>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Supabase auth hash parser
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    const type = params.get('type');
    
    const loadingMsg = document.getElementById('loading-msg');
    const errorMsg = document.getElementById('error-msg');
    const resetForm = document.getElementById('reset-form');
    
    if (accessToken && type === 'recovery') {
        // Valid token
        document.getElementById('access_token').value = accessToken;
        document.getElementById('refresh_token').value = refreshToken;
        loadingMsg.style.display = 'none';
        resetForm.style.display = 'block';
    } else {
        // Invalid or missing token
        loadingMsg.style.display = 'none';
        errorMsg.style.display = 'block';
    }
    
    // Validate passwords match before submit
    resetForm.addEventListener('submit', function(e) {
        const pass = document.getElementById('new_password').value;
        const confirm = document.getElementById('confirm_password').value;
        if (pass !== confirm) {
            e.preventDefault();
            document.getElementById('password-match-error').style.display = 'block';
        } else {
            document.getElementById('password-match-error').style.display = 'none';
        }
    });
});
</script>
{% endblock %}
