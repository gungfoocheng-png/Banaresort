{% extends "base.html" %}

{% block content %}
<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2rem;">
        <h1 style="color: var(--primary);">🏷️ จัดการประเภทรีสอร์ท</h1>
        <button class="btn btn-primary" onclick="document.getElementById('add-type-modal').style.display='block'">+ เพิ่มประเภทใหม่</button>
    </div>

    <!-- Types Table -->
    <div class="card admin-card">
        <table style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="border-bottom: 2px solid #f1f1f1; text-align: left; color: #718096; font-size: 0.85rem;">
                    <th style="padding: 1rem;">ID</th>
                    <th style="padding: 1rem;">ชื่อประเภทรีสอร์ท</th>
                    <th style="padding: 1rem;">วันที่เพิ่ม</th>
                    <th style="padding: 1rem; text-align: center;">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for type in resort_types %}
                <tr class="table-row" style="border-bottom: 1px solid #f8f8f8;">
                    <td style="padding: 1.2rem; color: #a0aec0;">#{{ type.id }}</td>
                    <td style="padding: 1.2rem; font-weight: bold; color: var(--secondary);">{{ type.name }}</td>
                    <td style="padding: 1.2rem; font-size: 0.9rem; color: #718096;">{{ type.created_at[:10] }}</td>
                    <td style="padding: 1.2rem; text-align: center;">
                        <form action="/admin/delete_resort_type/{{ type.id }}" method="POST" onsubmit="return confirm('ยืนยันการลบประเภทรีสอร์ทนี้?')">
                            <button type="submit" class="btn" style="background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; padding: 5px 12px; font-size: 0.8rem; border-radius: 6px;">ลบ</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align: center; padding: 2rem; color: #a0aec0;">ยังไม่มีประเภทรีสอร์ทในระบบ</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Add Type Modal -->
<div id="add-type-modal" class="modal">
    <div class="modal-content admin-card" style="max-width: 450px;">
        <h2 style="color: var(--primary); margin-top: 0;">➕ เพิ่มประเภทรีสอร์ท</h2>
        <form action="/admin/add_resort_type" method="POST" style="margin-top: 1.5rem;">
            <div style="margin-bottom: 1.5rem;">
                <label style="display: block; margin-bottom: 5px; font-weight: 600;">ชื่อประเภทรีสอร์ท:</label>
                <input type="text" name="name" required placeholder="เช่น แบบโมเดิร์น, แบบบ้านสวน" style="width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 1rem;">
                <button type="button" class="btn" onclick="document.getElementById('add-type-modal').style.display='none'">ยกเลิก</button>
                <button type="submit" class="btn btn-primary" style="padding-left: 2rem; padding-right: 2rem;">เพิ่มประเภท</button>
            </div>
        </form>
    </div>
</div>

<script>
window.onclick = function(event) {
    const addModal = document.getElementById('add-type-modal');
    if (event.target == addModal) {
        addModal.style.display = "none";
    }
}
</script>
{% endblock %}
