{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto; padding: 2rem;">
        <h2 style="text-align: center; color: var(--primary); margin-bottom: 1.5rem;">ลืมรหัสผ่าน</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">ระบบจะส่งลิงก์สำหรับตั้งรหัสผ่านใหม่ไปยังอีเมลของคุณ</p>
        
        <form action="/forgot-password" method="POST">
            <div style="margin-bottom: 1.5rem;">
                <label>อีเมลที่ใช้ลงทะเบียน:</label><br>
                <input type="email" name="email" required placeholder="กรอกอีเมลของคุณ" style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; margin-top: 0.5rem;">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; margin-bottom: 1rem;">ส่งลิงก์รีเซ็ตรหัสผ่าน</button>
            
            <div style="text-align: center; font-size: 0.9rem;">
                <a href="/login" style="color: var(--primary); text-decoration: none;">&laquo; กลับไปหน้าเข้าสู่ระบบ</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
