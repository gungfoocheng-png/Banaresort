{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="card" style="max-width: 400px; margin: 4rem auto; padding: 2rem;">
        <h2 style="text-align: center; color: var(--primary);">🌿 ลงทะเบียน</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">สร้างบัญชีใหม่เพื่อจัดการการจองของคุณ</p>
        
        <form action="/register" method="POST">
            <div style="margin-bottom: 1.5rem;">
                <label>ชื่อ-นามสกุล:</label><br>
                <input type="text" name="guest_name" required placeholder="สมชาย รักดี" style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label>เบอร์โทรศัพท์ (10 หลัก):</label><br>
                <input type="tel" name="phone" required 
                    pattern="\d{10}" maxlength="10" minlength="10" 
                    inputmode="numeric" placeholder="08XXXXXXXX"
                    style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>

            <div style="margin-bottom: 1.5rem;">
                <label>อีเมล:</label><br>
                <input type="email" name="email" required placeholder="your@email.com" style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            
            <div style="margin-bottom: 1.5rem;">
                <label>รหัสผ่าน:</label><br>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="reg-password" name="password" required style="width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 5px; padding-right: 45px; box-sizing: border-box;">
                    <button type="button" onclick="togglePassword('reg-password', this)" style="position: absolute; right: 5px; background: none; border: none; cursor: pointer; font-size: 1.2rem; padding: 0.5rem; display: flex; align-items: center; justify-content: center; color: #718096;">👁️</button>
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">ลงทะเบียน</button>
        </form>
        
        <div style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
            <p>มีบัญชีอยู่แล้ว? <a href="/login" style="color: var(--primary);">เข้าสู่ระบบที่นี่</a></p>
        </div>
    </div>
</div>
{% endblock %}
